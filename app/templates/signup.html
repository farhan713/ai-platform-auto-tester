{% extends "auth_layout.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<h1>Create your account</h1>
<p class="meta">Each QA gets their own account. Your runs, test files, and presets are private to you.</p>
{% if error %}<div class="err">{{ error }}</div>{% endif %}
<form method="POST" class="form">
  <label>
    <span class="label-text">Name</span>
    <input type="text" name="name" autocomplete="name" value="{{ name or '' }}">
  </label>
  <label>
    <span class="label-text">Email</span>
    <input type="email" name="email" autocomplete="email" required value="{{ email or '' }}">
  </label>
  <label>
    <span class="label-text">Password</span>
    <input type="password" name="password" autocomplete="new-password" required minlength="8">
    <small>At least 8 characters.</small>
  </label>
  <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px">Create account</button>
</form>
<p class="meta" style="text-align:center; margin-top:18px">
  Already have an account? <a href="{{ url_for('login') }}">Sign in</a>.
</p>
{% endblock %}
